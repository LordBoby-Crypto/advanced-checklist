<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Checklist" />
  <title>Advanced Checklist</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #172033;
      --text: #f9fafb;
      --muted: #a7b0c0;
      --line: rgba(255,255,255,.1);
      --accent: #60a5fa;
      --accent-2: #34d399;
      --danger: #fb7185;
      --warning: #fbbf24;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.28), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(52,211,153,.18), transparent 34rem),
        var(--bg);
      color: var(--text);
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      padding: max(18px, env(safe-area-inset-top)) 14px max(22px, env(safe-area-inset-bottom));
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin: 4px 2px 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 48px);
      letter-spacing: -0.05em;
      line-height: .95;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 9px;
      font-size: 14px;
    }

    .stats {
      min-width: 104px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stats strong {
      display: block;
      font-size: 26px;
      letter-spacing: -0.04em;
    }

    .stats span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar, .card {
      background: rgba(17,24,39,.82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .toolbar {
      padding: 12px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      position: sticky;
      top: max(8px, env(safe-area-inset-top));
      z-index: 5;
    }

    input, button {
      border: 0;
      font: inherit;
      border-radius: 16px;
      -webkit-appearance: none;
      appearance: none;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,.08);
      color: var(--text);
      outline: 1px solid transparent;
      padding: 14px 15px;
    }

    input:focus {
      outline-color: rgba(96,165,250,.65);
      background: rgba(255,255,255,.12);
    }

    button {
      color: var(--text);
      background: rgba(255,255,255,.1);
      padding: 13px 15px;
      cursor: pointer;
      user-select: none;
      min-height: 48px;
    }

    button:active { transform: scale(.98); }

    .primary {
      background: linear-gradient(135deg, var(--accent), #818cf8);
      font-weight: 700;
    }

    .green {
      background: linear-gradient(135deg, var(--accent-2), #22c55e);
      color: #062015;
      font-weight: 800;
    }

    .danger {
      background: rgba(251,113,133,.16);
      color: #fecdd3;
    }

    .ghost {
      color: var(--muted);
      background: transparent;
      padding: 8px 10px;
      min-height: 38px;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .card {
      overflow: hidden;
    }

    .topic-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid var(--line);
    }

    .topic-check {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      text-align: center;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      font-weight: 900;
      font-size: 19px;
    }

    .topic.done .topic-check {
      background: var(--accent-2);
      color: #052e1a;
    }

    .topic-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      overflow-wrap: anywhere;
    }

    .topic.done .topic-title {
      text-decoration: line-through;
      color: #c7f9dd;
    }

    .progress-wrap {
      margin-top: 8px;
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .2s ease;
    }

    .topic-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    .topic-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .sub-list {
      padding: 6px 12px 12px;
      display: grid;
      gap: 8px;
    }

    .sub-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 11px;
      align-items: center;
      padding: 11px 10px;
      border-radius: 15px;
      background: rgba(255,255,255,.055);
    }

    .sub-item.done {
      background: rgba(52,211,153,.1);
    }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      color: transparent;
    }

    .sub-item.done .check {
      background: var(--accent-2);
      color: #052e1a;
      border-color: transparent;
    }

    .sub-text {
      overflow-wrap: anywhere;
    }

    .sub-item.done .sub-text {
      text-decoration: line-through;
      color: #b8c5d8;
    }

    .add-sub {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 0 12px 13px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px 18px;
      border: 1px dashed rgba(255,255,255,.2);
      border-radius: var(--radius);
    }

    .footer-actions {
      display: flex;
      gap: 10px;
      margin: 16px 2px 0;
    }

    .footer-actions button {
      flex: 1;
    }

    dialog {
      width: min(92vw, 430px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      color: var(--text);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(4px);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .modal-actions button { flex: 1; }

    @media (max-width: 440px) {
      .topic-head { grid-template-columns: auto 1fr; }
      .topic-actions { grid-column: 1 / -1; justify-content: flex-end; }
      .toolbar { grid-template-columns: 1fr; }
      .toolbar button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Advanced Checklist</h1>
        <div class="subtitle">Topics, subtopics, auto-completion, local saving, and iPhone-friendly controls.</div>
      </div>
      <div class="stats" aria-live="polite">
        <strong id="overallPercent">0%</strong>
        <span>complete</span>
      </div>
    </header>

    <section class="toolbar" aria-label="Add topic">
      <input id="topicInput" placeholder="Add Topic, e.g. Kitchen" autocomplete="off" />
      <button class="primary" id="addTopicBtn">Add Topic</button>
    </section>

    <section id="list" class="list"></section>

    <section class="footer-actions">
      <button id="exportBtn">Export</button>
      <button id="importBtn">Import</button>
      <button class="danger" id="resetBtn">Reset</button>
    </section>
  </main>

  <dialog id="importDialog">
    <h2 style="margin:0 0 8px;font-size:22px;">Import Checklist</h2>
    <p style="color:var(--muted);margin:0 0 12px;">Paste exported checklist JSON below.</p>
    <textarea id="importText" style="width:100%;min-height:180px;border-radius:16px;background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);padding:12px;font:14px ui-monospace, SFMono-Regular, Menlo, monospace;"></textarea>
    <div class="modal-actions">
      <button id="cancelImport">Cancel</button>
      <button class="green" id="confirmImport">Import</button>
    </div>
  </dialog>

  <script>
    const KEY = "advanced-checklist-v1";

    let data = load();

    const $ = (id) => document.getElementById(id);
    const list = $("list");
    const topicInput = $("topicInput");

    function uid() {
      return crypto?.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function starterData() {
      return [
        {
          id: uid(),
          title: "Kitchen",
          items: [
            { id: uid(), text: "Counters", done: false },
            { id: uid(), text: "Fridge", done: false },
            { id: uid(), text: "Sink", done: false },
            { id: uid(), text: "Floors", done: false }
          ]
        }
      ];
    }

    function load() {
      try {
        const saved = localStorage.getItem(KEY);
        return saved ? JSON.parse(saved) : starterData();
      } catch {
        return starterData();
      }
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[s]));
    }

    function topicStats(topic) {
      const total = topic.items.length;
      const done = topic.items.filter(i => i.done).length;
      const complete = total > 0 && done === total;
      const percent = total ? Math.round((done / total) * 100) : 0;
      return { total, done, complete, percent };
    }

    function overallStats() {
      const items = data.flatMap(t => t.items);
      const total = items.length;
      const done = items.filter(i => i.done).length;
      return total ? Math.round((done / total) * 100) : 0;
    }

    function render() {
      $("overallPercent").textContent = overallStats() + "%";

      if (!data.length) {
        list.innerHTML = `<div class="empty">No topics yet. Add your first topic above.</div>`;
        return;
      }

      list.innerHTML = data.map(topic => {
        const stats = topicStats(topic);
        return `
          <article class="card topic ${stats.complete ? "done" : ""}" data-topic="${topic.id}">
            <div class="topic-head">
              <div class="topic-check">${stats.complete ? "✓" : ""}</div>
              <div>
                <div class="topic-title">${escapeHTML(topic.title)}</div>
                <div class="progress-wrap"><div class="progress" style="width:${stats.percent}%"></div></div>
                <div class="topic-meta">${stats.done}/${stats.total} subtopics complete</div>
              </div>
              <div class="topic-actions">
                <button class="ghost" data-action="rename-topic">Rename</button>
                <button class="ghost danger" data-action="delete-topic">Delete</button>
              </div>
            </div>

            <div class="sub-list">
              ${topic.items.length ? topic.items.map(item => `
                <div class="sub-item ${item.done ? "done" : ""}" data-item="${item.id}">
                  <button class="check" data-action="toggle-item" aria-label="Toggle ${escapeHTML(item.text)}">${item.done ? "✓" : ""}</button>
                  <div class="sub-text">${escapeHTML(item.text)}</div>
                  <div>
                    <button class="ghost" data-action="rename-item">Edit</button>
                    <button class="ghost danger" data-action="delete-item">Delete</button>
                  </div>
                </div>
              `).join("") : `<div class="empty" style="padding:16px;">No subtopics yet.</div>`}
            </div>

            <div class="add-sub">
              <input placeholder="Add Sub Topic, e.g. Counters" data-input="subtopic" autocomplete="off" />
              <button class="green" data-action="add-item">Add</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function addTopic() {
      const title = topicInput.value.trim();
      if (!title) return;
      data.unshift({ id: uid(), title, items: [] });
      topicInput.value = "";
      save();
      render();
    }

    function findTopic(topicId) {
      return data.find(t => t.id === topicId);
    }

    function findItem(topic, itemId) {
      return topic.items.find(i => i.id === itemId);
    }

    $("addTopicBtn").addEventListener("click", addTopic);
    topicInput.addEventListener("keydown", e => {
      if (e.key === "Enter") addTopic();
    });

    list.addEventListener("click", e => {
      const button = e.target.closest("button");
      if (!button) return;

      const card = e.target.closest("[data-topic]");
      if (!card) return;

      const topicId = card.dataset.topic;
      const topic = findTopic(topicId);
      if (!topic) return;

      const action = button.dataset.action;
      const row = e.target.closest("[data-item]");
      const item = row ? findItem(topic, row.dataset.item) : null;

      if (action === "add-item") {
        const input = card.querySelector('[data-input="subtopic"]');
        const text = input.value.trim();
        if (!text) return;
        topic.items.push({ id: uid(), text, done: false });
        input.value = "";
      }

      if (action === "toggle-item" && item) item.done = !item.done;

      if (action === "delete-item" && item) {
        if (confirm(`Delete "${item.text}"?`)) topic.items = topic.items.filter(i => i.id !== item.id);
      }

      if (action === "rename-item" && item) {
        const next = prompt("Rename subtopic:", item.text);
        if (next && next.trim()) item.text = next.trim();
      }

      if (action === "delete-topic") {
        if (confirm(`Delete topic "${topic.title}" and all its subtopics?`)) data = data.filter(t => t.id !== topic.id);
      }

      if (action === "rename-topic") {
        const next = prompt("Rename topic:", topic.title);
        if (next && next.trim()) topic.title = next.trim();
      }

      save();
      render();
    });

    list.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const input = e.target.closest('[data-input="subtopic"]');
      if (!input) return;
      const card = e.target.closest("[data-topic]");
      card.querySelector('[data-action="add-item"]').click();
    });

    $("resetBtn").addEventListener("click", () => {
      if (!confirm("Reset the full checklist?")) return;
      data = starterData();
      save();
      render();
    });

    $("exportBtn").addEventListener("click", async () => {
      const text = JSON.stringify(data, null, 2);
      try {
        await navigator.clipboard.writeText(text);
        alert("Checklist copied to clipboard.");
      } catch {
        prompt("Copy your checklist JSON:", text);
      }
    });

    $("importBtn").addEventListener("click", () => {
      $("importText").value = "";
      $("importDialog").showModal();
    });

    $("cancelImport").addEventListener("click", () => $("importDialog").close());

    $("confirmImport").addEventListener("click", () => {
      try {
        const parsed = JSON.parse($("importText").value);
        if (!Array.isArray(parsed)) throw new Error();
        data = parsed;
        save();
        render();
        $("importDialog").close();
      } catch {
        alert("Invalid checklist JSON.");
      }
    });

    render();
  </script>
</body>
</html>
